name: documentation

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/docs.yml"
      - "docs/**"

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: sagemath/sagemath:latest
      options: --user root

    steps:
      - name: Install make, TeX Live and Sphinx
        run: |
          apt-get update
          apt-get install -y tzdata
          apt-get install -y make
          apt-get install -y texlive
          apt-get install -y texlive-latex-extra
          apt-get install -y texlive-luatex
          apt-get install -y latexmk
          apt-get install -y fonts-freefont-otf
          apt-get install -y xindy
          apt-get install -y python3-sphinx

          sage -pip install sphinx-book-theme

      - name: Checkout QuiverTools
        uses: actions/checkout@v4

      - name: Install QuiverTools
        run: sage --pip install .

      - name: Run Sphinx
        run: |
          cd docs
          make html
          make latexpdf

      - name: Create artifact
        run: |
          touch docs/_build/html/.nojekyll

          mkdir -p github-artifacts

          mv docs/_build/latex/quivertools.pdf \
             github-artifacts/documentation.pdf

          cp -r docs/_build/html/* github-artifacts/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs
          path: ./github-artifacts

  deploy:
    needs: [build]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: docs
          path: github-deploy

      - name: Deploy on docs branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./github-deploy
          publish_branch: docs
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com